<style>
:root {
  color-scheme: light;
  --black: #0A0A0A;
  --white: #FFFFFF;
  --off-white: #F5F5F3;
  --yellow: #FFF200;
  --orange: #FF9100;
  --green: #7DF431;
  --mid: #555555;
  --light: #E0E0DC;
  --rule: #D0D0CC;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--black);
  color: var(--white);
  min-height: 100vh;
}

.top-nav {
  background: var(--black);
  border-bottom: 1px solid #222;
  padding: 0 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 20;
  height: 49px;
}
.nav-logo {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  color: var(--yellow);
  letter-spacing: 3px;
  text-transform: uppercase;
}
.nav-tabs {
  display: flex;
  gap: 0;
}
.nav-tab {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #999;
  padding: 16px 18px;
  cursor: pointer;
  border: none;
  border-bottom: 2px solid transparent;
  background: none;
  transition: color 0.15s;
}
.nav-tab:hover { color: #ccc; }
.nav-tab.active { color: var(--yellow); border-bottom-color: var(--yellow); }

.masthead {
  background: var(--black);
  padding: 32px 32px 0;
  border-bottom: none;
}
.mast-eyebrow {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #555;
  margin-bottom: 12px;
}

.pub-name {
  font-family: 'Trouble', 'Space Grotesk', sans-serif;
  font-size: 56px;
  font-weight: 400;
  color: var(--white);
  line-height: 1;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.pub-name span { color: var(--yellow); }
.mast-rule {
  border: none;
  border-top: 1px solid #222;
  margin: 16px 0 14px;
}
.mast-bottom {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding-bottom: 14px;
  flex-wrap: wrap;
  gap: 6px;
}
.mast-tagline { font-family: 'Space Mono', monospace; font-size: 10px; color: #555; letter-spacing: 1px; }
.mast-date { font-family: 'Space Mono', monospace; font-size: 10px; color: #555; letter-spacing: 1px; }

.lede {
  background: #111;
  padding: 0 32px;
  border-bottom: 1px solid #222;
}
.lede-text {
  font-size: 13px;
  color: #888;
  line-height: 1.75;
  padding: 12px 0;
}
.lede-stats {
  display: flex;
  gap: 28px;
  flex-wrap: wrap;
}
.lede-stat {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  color: #555;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 16px 0;
}
.lede-stat strong {
  font-family: 'Space Grotesk', sans-serif;

  {"Company":"Boundary Labs","Stage":"Pre-Seed","Amount (M)":2,"City":"New York","State":"NY","Investors":"Felicis Ventures (lead); Notion Capital","Market":"B2B","Women-Founded":"__NO__","Description":"AI agent for security operations centers that triages and resolves alerts autonomously.","Source URL":"https://axios.link/boundary-labs","date:Edition Date:start":"2026-05-18"},
  {"Company":"Avant Genomics","Stage":"Seed","Amount (M)":3,"City":"Charlottesville","State":"VA","Investors":"Felicis (lead)","Market":"B2B","Women-Founded":"__NO__","Description":"Genomic medicine startup developing precision therapies based on patient genetics.","Source URL":"https://axios.link/avant-genomics","date:Edition Date:start":"2026-05-18"},
  {"Company":"Rely","Stage":"Seed","Amount (M)":4.5,"City":"Portland","State":"ME","Investors":"Maine Venture Fund (lead)","Market":"B2B","Women-Founded":"__NO__","Description":"Cloud-based field service management platform for HVAC and home services contractors.","Source URL":"https://axios.link/rely","date:Edition Date:start":"2026-05-18"},
  {"Company":"BranchLab","Stage":"Series A","Amount (M)":26,"City":"Boulder","State":"CO","Investors":"Lightspeed Venture Partners (lead)","Market":"B2B","Women-Founded":"__NO__","Description":"AI-powered healthcare advertising platform that helps pharma reach physicians through privacy-safe data.","Source URL":"https://axios.link/branchlab","date:Edition Date:start":"2026-05-18"},
  {"Company":"Autoimmunity BioSolutions","Stage":"Seed","Amount (M)":1,"City":"League City","State":"TX","Investors":"Eos BioInnovation (lead)","Market":"B2B","Women-Founded":"__NO__","Description":"Develops therapeutics for autoimmune diseases including lupus and rheumatoid arthritis.","Source URL":"https://axios.link/autoimmunity-bio","date:Edition Date:start":"2026-05-18"}
];

let currentFilter = { stage: 'All', market: null, search: '' };
let currentEdition = '2026-06-01';

function init() {
  renderEdition();
  renderArchive();
  updateStats();
}

function renderEdition() {
  const deals = DEALS.filter(d => d['date:Edition Date:start'] === currentEdition);
  const filtered = applyFilters(deals);

  const dateObj = new Date(currentEdition + 'T00:00:00Z');
  const weekStart = new Date(dateObj);
  weekStart.setDate(dateObj.getDate() - 5);
  const weekEnd = dateObj;

  const dateStr = `Week of ${weekStart.toLocaleDateString('en-US', {month: 'short', day: 'numeric'})} – ${weekEnd.toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric'})}`;
  document.getElementById('edition-date-header').textContent = dateStr;

  let html = '';
  const stageGroups = {};

  filtered.forEach(d => {
    if (!stageGroups[d.Stage]) stageGroups[d.Stage] = [];
    stageGroups[d.Stage].push(d);
  });

  const stageOrder = ['Pre-Seed', 'Seed', 'Series A', 'Growth', 'Exit'];
  stageOrder.forEach(stage => {
    if (stageGroups[stage]) {
      html += `<div class="section-label">
        <span>${stage}</span>
        <span class="section-count">${stageGroups[stage].length} deal${stageGroups[stage].length !== 1 ? 's' : ''}</span>
      </div>`;

      stageGroups[stage].forEach(d => {
        const amountStr = d['Amount (M)'] > 0 ? `$${d['Amount (M)'].toLocaleString()}M` : '';
        const womenBadge = d['Women-Founded'] === '__YES__' ? '<span class="badge women-badge">Women-Founded</span>' : '';
        const marketBadge = `<span class="badge market-badge">${d.Market}</span>`;

        html += `<div class="entry" data-stage="${d.Stage}" data-market="${d.Market}" data-search="${d.Company.toLowerCase()}">
          <div class="entry-header">
            <div class="entry-name">${d.Company}</div>
            ${amountStr ? `<div class="entry-amount">${amountStr}</div>` : ''}
            ${womenBadge}
            ${marketBadge}
          </div>
          <div class="entry-byline">
            <span>${d.City}${d.State ? ', ' + d.State : ''}</span>
            <span class="sep">·</span>
            <span>${d.Investors}</span>
          </div>
          <div class="entry-body">${d.Description}</div>
        </div>`;
      });
    }
  });

  if (filtered.length === 0) {
    html = '<div class="empty">No deals match your filters.</div>';
  }

  document.getElementById('deals-body').innerHTML = html;
}

function renderArchive() {
  const editions = [...new Set(DEALS.map(d => d['date:Edition Date:start']))].sort().reverse();
  let html = '';

  editions.forEach(date => {
    const dealsInEdition = DEALS.filter(d => d['date:Edition Date:start'] === date);
    const dateObj = new Date(date + 'T00:00:00Z');
    const dateStr = dateObj.toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric'});
    const count = dealsInEdition.length;

    html += `<div class="archive-row" onclick="switchEdition('${date}')">
      <div>
        <div class="archive-date">${dateStr}</div>
        <div class="archive-meta">${count} deal${count !== 1 ? 's' : ''}</div>
      </div>
      <div class="archive-arrow">→</div>
    </div>`;
  });

  document.getElementById('archive-list').innerHTML = html;
}

function updateStats() {
  const dealsInEdition = DEALS.filter(d => d['date:Edition Date:start'] === currentEdition);
  const totalAmount = dealsInEdition.reduce((sum, d) => sum + (d['Amount (M)'] || 0), 0);
  const avgAmount = dealsInEdition.length > 0 ? (totalAmount / dealsInEdition.length).toFixed(1) : 0;

  const html = `
    <div class="lede-stat">
      <strong>${dealsInEdition.length}</strong>
      Deals
    </div>
    <div class="lede-stat">
      <strong>$${totalAmount.toLocaleString()}M</strong>
      Capital
    </div>
    <div class="lede-stat">
      <strong>$${parseFloat(avgAmount).toLocaleString()}M</strong>
      Average
    </div>
  `;

  document.getElementById('lede-stats').innerHTML = html;
}

function applyFilters(deals) {
  return deals.filter(d => {
    if (currentFilter.stage !== 'All' && d.Stage !== currentFilter.stage) return false;
    if (currentFilter.market && d.Market !== currentFilter.market) return false;
    if (currentFilter.search && !d.Company.toLowerCase().includes(currentFilter.search)) return false;
    return true;
  });
}

function filterStage(stage, btn) {
  document.querySelectorAll('.controls .pill[data-stage]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter.stage = stage;
  renderEdition();
}

function filterMarket(market, btn) {
  document.querySelectorAll('.controls .pill[data-market]').forEach(b => b.classList.remove('active'));
  if (currentFilter.market === market) {
    currentFilter.market = null;
  } else {
    btn.classList.add('active');
    currentFilter.market = market;
  }
  renderEdition();
}

function handleSearch(query) {
  currentFilter.search = query.toLowerCase();
  renderEdition();
}

function switchEdition(date) {
  currentEdition = date;
  currentFilter = { stage: 'All', market: null, search: '' };
  document.querySelectorAll('.controls .pill').forEach(p => {
    if (p.getAttribute('data-stage') === 'All') {
      p.classList.add('active');
    } else {
      p.classList.remove('active');
    }
  });
  document.getElementById('search-main').value = '';
  renderEdition();
  updateStats();
  showTab('edition');
}

function showTab(tab) {
  document.getElementById('view-edition').style.display = tab === 'edition' ? 'block' : 'none';
  document.getElementById('view-archive').style.display = tab === 'archive' ? 'block' : 'none';
  document.querySelectorAll('.nav-tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'edition') || (i === 1 && tab === 'archive'));
  });
}

init();
</script>
</body>
</html>
