const editions = [
  { date: "2026-06-01", label: "May 31 – June 6, 2026", current: true },
  { date: "2026-05-25", label: "May 24 – May 30, 2026" },
  { date: "2026-05-26", label: "May 19 – May 25, 2026" },
  { date: "2026-05-18", label: "May 10 – May 16, 2026" }
];

let currentFilter = "all";
let currentSearch = "";

function formatAmount(amount) {
  if (amount === null || amount === undefined) return "Amount undisclosed";
  if (amount >= 1000) return "$" + (amount / 1000).toFixed(1) + "B";
  return "$" + amount + "M";
}

function renderDeals(deals) {
  return deals.map(deal => `
    <div class="deal-card" data-stage="${deal.stage}" data-company="${deal.company.toLowerCase()}">
      <div class="deal-stage">${deal.stage}</div>
      <div class="deal-company">${deal.company}</div>
      <div class="deal-amount">${formatAmount(deal.amount)}</div>
      <div class="deal-desc">${deal.desc}</div>
      <div class="deal-meta">
        <span class="deal-meta-label">Location: ${deal.city}${deal.city ? ', ' + deal.state : ''}</span>
        <span class="deal-meta-label">Market: ${deal.market}</span>
      </div>
    </div>
  `).join("");
}

function filterDeals() {
  const search = document.getElementById("searchInput").value.toLowerCase();
  currentSearch = search;
  const container = document.getElementById("deals-container");
  const cards = container.querySelectorAll(".deal-card");

  cards.forEach(card => {
    const company = card.dataset.company;
    const stage = card.dataset.stage;
    const matchesSearch = company.includes(search) || search === "";
    const matchesFilter = currentFilter === "all" || stage === currentFilter;
    card.style.display = (matchesSearch && matchesFilter) ? "" : "none";
  });
}

function filterByStage(stage) {
  currentFilter = stage;
  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.classList.remove("active");
  });
  event.target.classList.add("active");
  filterDeals();
}

function showCurrentEdition() {
  const currentDeals = allDeals["2026-06-01"] || [];
  const container = document.getElementById("deals-container");
  container.innerHTML = currentDeals.length > 0 ? renderDeals(currentDeals) : '<div class="no-results">No deals found.</div>';
  filterDeals();
}

function showTab(tab) {
  const currentTab = document.getElementById("current-tab");
  const archiveTab = document.getElementById("archive-tab");
  const navTabs = document.querySelectorAll(".nav-tab");

  if (tab === "current") {
    currentTab.style.display = "";
    archiveTab.style.display = "none";
    navTabs[0].classList.add("active");
    navTabs[1].classList.remove("active");
    showCurrentEdition();
  } else {
    currentTab.style.display = "none";
    archiveTab.style.display = "";
    navTabs[0].classList.remove("active");
    navTabs[1].classList.add("active");
    renderArchive();
  }
}

function renderArchive() {
  const archiveContainer = document.getElementById("archive-container");
  let html = "";

  for (let i = 1; i < editions.length; i++) {
    const edition = editions[i];
    const deals = allDeals[edition.date] || [];
    html += `
      <div class="edition">
        <h2 class="edition-header">${edition.label}</h2>
        <div class="deals-grid">
          ${deals.length > 0 ? renderDeals(deals) : '<div class="no-results">No deals recorded.</div>'}
        </div>
      </div>
    `;
  }

  archiveContainer.innerHTML = html;
}

showCurrentEdition();
